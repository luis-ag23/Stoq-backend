# Base de datos Supabase (PostgreSQL)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.xxejhmmzehadkfrzlsdw}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:databaseStoq1783}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:2}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:10000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:600000}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor
server.port=8080
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,https://*.netlify.app}

# Logging - General
logging.level.root=INFO
logging.level.com.Proyecto.stoq=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# Logging - Auditoría y Monitoreo
logging.level.com.Proyecto.stoq.application.aspects.ApiLoggingAspect=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/stoq-application.log

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus,env,beans,threaddump,loggers
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.prometheus.metrics.export.enabled=true

# Actuator Endpoint Paths
management.endpoints.web.base-path=/actuator
management.endpoint.health.enabled=true
management.endpoint.metrics.enabled=true


