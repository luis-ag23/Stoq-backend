# Configuración de base de datos H2 (en memoria para desarrollo)
spring.datasource.url=jdbc:h2:mem:stoq_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Configuración de JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Puerto del servidor
server.port=0

# Configuración de logging
logging.level.com.Proyecto.stoq.application.aspects=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n